{% extends "base.html" %}

{% block title %}Quiz - TAPA{% endblock %}

{% block content %}
    <div class="card">
        <div class="question-meta">
            {{ material.title }} · {{ level }} · Question {{ question_number }} of {{ total_questions }}
        </div>

        <div class="progress-wrap">
            <progress value="{{ question_number }}" max="{{ total_questions }}" style="width: 100%; height: 18px;"></progress>
        </div>

        <form method="POST">
            <div class="question-text">{{ question.question_text }}</div>

            <div class="choice-list">
                {% for choice in question.choices %}
                    <div class="choice-item">
                        <label>
                            <input
                                type="radio"
                                name="selected_choice"
                                value="{{ choice.id }}"
                                {% if selected_answer == choice.id %}checked{% endif %}
                            >
                            {{ choice.choice_text }}
                        </label>
                    </div>
                {% endfor %}
            </div>

            <div class="inline-actions">
                <button type="submit" class="btn">
                    {% if question_number == total_questions %}Finish Quiz{% else %}Next{% endif %}
                </button>
            </div>
        </form>
    </div>
{% endblock %}
