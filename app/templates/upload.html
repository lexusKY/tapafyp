{% extends "base.html" %}

{% block title %}Upload Lecture Files - TAPA{% endblock %}

{% block content %}
    <h2>Upload Lecture Files</h2>
    <p>Upload up to 3 files for one revision set.</p>
    <p>Supported formats: PDF, DOCX, PPTX, HTML</p>

    <form method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 10px;">
            <label for="title">Revision Set Title</label><br>
            <input type="text" id="title" name="title" placeholder="Example: UECS3253 Topic 1 Notes" required>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="note_files">Choose 1 to 3 files</label><br>
            <input type="file" id="note_files" name="note_files" multiple required>
        </div>

        <button type="submit">Upload Files</button>
    </form>
{% endblock %}
