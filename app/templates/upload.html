{% extends "base.html" %}

{% block title %}Upload PDF - TAPA{% endblock %}

{% block content %}
    <h2>Upload Past Year Exam PDF</h2>
    <p>Select a UTAR final exam PDF to use as the question source.</p>

    <form method="POST" enctype="multipart/form-data">
        <div style="margin-bottom: 10px;">
            <label for="title">Material Title</label><br>
            <input type="text" id="title" name="title" placeholder="Example: UECS2023 Final Exam 2024" required>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="pdf_file">Choose PDF</label><br>
            <input type="file" id="pdf_file" name="pdf_file" accept=".pdf" required>
        </div>

        <button type="submit">Upload PDF</button>
    </form>
{% endblock %}
